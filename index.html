<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>家電庫存查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F2F4F8; font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, useCallback } = React;

// ── Firebase 設定 ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBXKXp7JWpjopZUV01nfN1GvWWpe2LOsuQ",
  authDomain: "sampo-58f06.firebaseapp.com",
  projectId: "sampo-58f06",
  storageBucket: "sampo-58f06.firebasestorage.app",
  messagingSenderId: "476808643013",
  appId: "1:476808643013:web:f170a4300497cd4b5a8bac",
  measurementId: "G-XXWR0HQE89"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC_REF = db.collection("inventory").doc("current");

// ── 設定 ──────────────────────────────────────────────────────
const TARGET_LOCATION = "4326"; // 只顯示這個儲存地點給經銷商

const PREFIX_RULES = [
  { prefixes: ["EM", "QM"], category: "電視" },
  { prefixes: ["SR"],       category: "冰箱" },
  { prefixes: ["ES"],       category: "洗衣機" },
  { prefixes: ["AU"],       category: "冷氣室外機" },
  { prefixes: ["AM"],       category: "冷氣室內機" },
];

function getCategory(model) {
  const m = String(model).toUpperCase();
  for (const rule of PREFIX_RULES) {
    if (rule.prefixes.some(p => m.startsWith(p))) return rule.category;
  }
  return null;
}

const CATEGORY_COLORS = {
  "電視":      { bg: "#F3E5F5", text: "#6A1B9A", dot: "#9C27B0" },
  "冰箱":      { bg: "#E8F5E9", text: "#2E7D32", dot: "#4CAF50" },
  "洗衣機":    { bg: "#FFF3E0", text: "#E65100", dot: "#FF9800" },
  "冷氣室外機": { bg: "#E8F4FD", text: "#1A6B9A", dot: "#2196F3" },
  "冷氣室內機": { bg: "#E0F7FA", text: "#00695C", dot: "#00BCD4" },
};

const DEFAULT_THRESHOLD = {
  "電視": 10, "冰箱": 10, "洗衣機": 10, "冷氣室外機": 5, "冷氣室內機": 5,
};

function getStockStatus(stock, threshold) {
  if (stock === 0) return "無庫存";
  if (stock < threshold) return "庫存不足";
  return "充足";
}

// ── 小元件 ────────────────────────────────────────────────────
function ProductRow({ item }) {
  const cat = CATEGORY_COLORS[item.category] || { dot: "#999" };
  const hasStock = item.stock > 0;
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "10px 14px", background: "#fff", borderBottom: "1px solid #F0F0F0",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, flex: 1 }}>
        <span style={{ width: 8, height: 8, borderRadius: "50%", background: cat.dot, flexShrink: 0 }} />
        <span style={{ fontSize: 14, fontWeight: 600, color: "#1A1A2E", wordBreak: "break-all" }}>{item.model}</span>
      </div>
      <span style={{ fontSize: 18, fontWeight: 800, marginLeft: 12, flexShrink: 0, color: hasStock ? "#2E7D32" : "#C62828" }}>
        {item.stock}
      </span>
    </div>
  );
}

// ── 主 APP ────────────────────────────────────────────────────
function InventoryApp() {
  const [data, setData] = useState([]);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("全部");
  const [tab, setTab] = useState("查詢");
  const [uploadMsg, setUploadMsg] = useState("");
  const [isUploading, setIsUploading] = useState(false);
  const fileRef = useRef();

  // ── 從 Firestore 讀取資料，並監聽即時更新 ──────────────────
  useEffect(() => {
    const unsubscribe = DOC_REF.onSnapshot(
      (doc) => {
        if (doc.exists) {
          const payload = doc.data();
          setData(payload.items || []);
          setLastUpdated(payload.updatedAt || null);
        } else {
          setData([]);
        }
        setLoading(false);
      },
      (err) => {
        console.error("讀取失敗", err);
        setLoading(false);
      }
    );
    return () => unsubscribe();
  }, []);

  const categories = ["全部", ...Object.keys(CATEGORY_COLORS)];

  const filtered = useMemo(() => {
    return data.filter(item => {
      const q = search.trim().toLowerCase();
      const matchSearch = !q || item.model.toLowerCase().includes(q);
      const matchCat = categoryFilter === "全部" || item.category === categoryFilter;
      return matchSearch && matchCat;
    });
  }, [data, search, categoryFilter]);

  const alertItems = data.filter(i => i.stock < i.threshold);

  const stats = {
    total: data.length,
    lowStock: data.filter(i => i.stock > 0 && i.stock < i.threshold).length,
    outOfStock: data.filter(i => i.stock === 0).length,
    totalUnits: data.reduce((a, b) => a + b.stock, 0),
  };

  // ── 上傳並解析 SAP 原始檔 ────────────────────────────────────
  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    setIsUploading(true);
    setUploadMsg("");

    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const sheetName = wb.SheetNames.includes("庫存原始檔") ? "庫存原始檔" : wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

        if (!rows.length) {
          setUploadMsg("❌ 檔案沒有資料，請確認格式是否正確");
          setIsUploading(false);
          return;
        }

        const matched = {};
        for (const row of rows) {
          const loc = String(row["儲存地點"] ?? "").trim();
          if (loc !== TARGET_LOCATION) continue;

          const model = String(row["物料"] ?? "").trim();
          if (!model) continue;

          const category = getCategory(model);
          if (!category) continue;

          const qty = Number(row["未限制"] ?? 0) || 0;

          if (!matched[model]) {
            matched[model] = { model, category, stock: 0, threshold: DEFAULT_THRESHOLD[category] ?? 5 };
          }
          matched[model].stock += qty;
        }

        const items = Object.values(matched).sort((a, b) =>
          a.category === b.category ? a.model.localeCompare(b.model) : a.category.localeCompare(b.category)
        );

        if (!items.length) {
          setUploadMsg(`❌ 在儲位 ${TARGET_LOCATION} 中找不到符合分類的型號，請確認檔案內容`);
          setIsUploading(false);
          return;
        }

        const now = new Date().toLocaleString("zh-TW", { hour12: false });

        await DOC_REF.set({ items, updatedAt: now });

        setUploadMsg(`✅ 成功更新 ${items.length} 項產品（儲位 ${TARGET_LOCATION}），經銷商重新整理頁面即可看到`);
      } catch (err) {
        console.error(err);
        setUploadMsg("❌ 解析或上傳失敗，請確認檔案格式或網路連線");
      }
      setIsUploading(false);
    };
    reader.readAsBinaryString(file);
    e.target.value = "";
  }

  // ── UI ────────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#F2F4F8", maxWidth: 480, margin: "0 auto" }}>
      <div style={{ background: "linear-gradient(135deg, #1A237E 0%, #283593 60%, #3949AB 100%)", padding: "20px 20px 0", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 12px rgba(26,35,126,0.25)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11, letterSpacing: 2, textTransform: "uppercase" }}>即時庫存系統</div>
            <div style={{ color: "#fff", fontSize: 20, fontWeight: 800, marginTop: 2 }}>家電庫存查詢</div>
          </div>
          {lastUpdated && (
            <div style={{ textAlign: "right" }}>
              <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 10 }}>上次更新</div>
              <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 11, marginTop: 1 }}>{lastUpdated}</div>
            </div>
          )}
        </div>

        <div style={{ display: "flex", gap: 4, marginTop: 16 }}>
          {["查詢", "管理"].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              padding: "8px 20px", borderRadius: "8px 8px 0 0", border: "none", cursor: "pointer",
              fontWeight: 700, fontSize: 13,
              background: tab === t ? "#F2F4F8" : "transparent",
              color: tab === t ? "#1A237E" : "rgba(255,255,255,0.7)",
              transition: "all 0.2s",
            }}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 16px 40px" }}>
        {loading && <div style={{ textAlign: "center", padding: "60px 20px", color: "#AAAAAA" }}>載入中…</div>}

        {!loading && tab === "查詢" && (
          <>
            {data.length === 0 ? (
              <div style={{ textAlign: "center", padding: "50px 20px", background: "#fff", borderRadius: 14, color: "#AAAAAA" }}>
                <div style={{ fontSize: 36 }}>📭</div>
                <div style={{ marginTop: 10, fontSize: 14, fontWeight: 600, color: "#777" }}>尚無庫存資料</div>
                <div style={{ marginTop: 4, fontSize: 12 }}>請至「管理」分頁上傳 SAP 庫存表</div>
              </div>
            ) : (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  {[
                    { label: "總品項", value: stats.total, color: "#1A237E" },
                    { label: "總庫存", value: `${stats.totalUnits} 台`, color: "#2E7D32" },
                    { label: "庫存不足", value: stats.lowStock, color: "#E65100", alert: stats.lowStock > 0 },
                    { label: "無庫存", value: stats.outOfStock, color: "#C62828", alert: stats.outOfStock > 0 },
                  ].map(s => (
                    <div key={s.label} style={{ background: "#fff", borderRadius: 12, padding: "12px 14px", boxShadow: s.alert ? `0 0 0 2px ${s.color}30` : "0 1px 4px rgba(0,0,0,0.06)" }}>
                      <div style={{ fontSize: 11, color: "#999", fontWeight: 500 }}>{s.label}</div>
                      <div style={{ fontSize: 22, fontWeight: 800, color: s.color, marginTop: 2 }}>{s.value}</div>
                    </div>
                  ))}
                </div>

                {alertItems.length > 0 && (
                  <div style={{ background: "#FFF8E1", borderRadius: 10, padding: "10px 14px", border: "1px solid #FFD54F", marginBottom: 14, display: "flex", alignItems: "flex-start", gap: 8 }}>
                    <span style={{ fontSize: 18 }}>⚠️</span>
                    <span style={{ fontSize: 12, color: "#E65100", fontWeight: 600, lineHeight: 1.5 }}>{alertItems.length} 項產品庫存不足或缺貨</span>
                  </div>
                )}

                <div style={{ position: "relative", marginBottom: 10 }}>
                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 16 }}>🔍</span>
                  <input
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    placeholder="搜尋型號…"
                    style={{ width: "100%", boxSizing: "border-box", padding: "11px 12px 11px 38px", borderRadius: 10, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", background: "#fff", fontFamily: "inherit" }}
                  />
                </div>

                <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 10 }}>
                  {categories.map(c => (
                    <button key={c} onClick={() => setCategoryFilter(c)} style={{
                      padding: "5px 12px", borderRadius: 99, border: "1.5px solid",
                      whiteSpace: "nowrap", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                      borderColor: categoryFilter === c ? "#1A237E" : "#E0E0E0",
                      background: categoryFilter === c ? "#1A237E" : "#fff",
                      color: categoryFilter === c ? "#fff" : "#666",
                      transition: "all 0.15s",
                    }}>{c}</button>
                  ))}
                </div>

                <div style={{ fontSize: 12, color: "#999", marginBottom: 10 }}>顯示 {filtered.length} / {data.length} 項</div>

                {filtered.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 20px", background: "#fff", borderRadius: 14, color: "#AAAAAA" }}>
                    <div style={{ fontSize: 32 }}>📦</div>
                    <div style={{ marginTop: 8, fontSize: 14 }}>查無符合條件的產品</div>
                  </div>
                ) : (
                  Object.entries(
                    filtered.reduce((acc, item) => {
                      (acc[item.category] = acc[item.category] || []).push(item);
                      return acc;
                    }, {})
                  ).map(([cat, items]) => (
                    <div key={cat} style={{ marginBottom: 16 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 700, color: "#666", padding: "4px 4px 6px" }}>
                        <span style={{ width: 8, height: 8, borderRadius: "50%", background: CATEGORY_COLORS[cat]?.dot }} />
                        {cat}（{items.length}）
                      </div>
                      <div style={{ borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 6px rgba(0,0,0,0.06)" }}>
                        {items.map(item => <ProductRow key={item.model} item={item} />)}
                      </div>
                    </div>
                  ))
                )}
              </>
            )}
          </>
        )}

        {!loading && tab === "管理" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: "#1A237E", marginBottom: 4 }}>📤 上傳 SAP 庫存表</div>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>
                直接上傳 SAP 匯出的庫存表（.xlsx/.xlsm）。系統會自動從「庫存原始檔」工作表中，<br/>
                篩選儲存地點 <b>{TARGET_LOCATION}</b> 且符合五大分類的型號，更新後經銷商重新整理頁面即可看到。
              </div>

              <button
                onClick={() => fileRef.current?.click()}
                disabled={isUploading}
                style={{
                  width: "100%", padding: "14px", borderRadius: 10, border: "2px dashed #3949AB",
                  background: isUploading ? "#F5F5F5" : "#EEF0FB", color: "#3949AB", fontWeight: 700, fontSize: 14,
                  cursor: isUploading ? "not-allowed" : "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}
              >
                {isUploading ? "⏳ 解析並上傳中…" : "📁 每日上傳庫存表"}
              </button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.xlsm" onChange={handleFileUpload} style={{ display: "none" }} />

              {uploadMsg && (
                <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 8, background: uploadMsg.startsWith("✅") ? "#E8F5E9" : "#FFEBEE", color: uploadMsg.startsWith("✅") ? "#2E7D32" : "#C62828", fontSize: 13, fontWeight: 600, lineHeight: 1.5 }}>{uploadMsg}</div>
              )}
            </div>

            <div style={{ background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 }}>📋 自動分類規則</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {Object.entries(CATEGORY_COLORS).map(([cat, c]) => {
                  const rule = PREFIX_RULES.find(r => r.category === cat);
                  return (
                    <div key={cat} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ width: 10, height: 10, borderRadius: "50%", background: c.dot, flexShrink: 0 }} />
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#333", width: 78 }}>{cat}</span>
                      <span style={{ fontSize: 12, color: "#888", fontFamily: "monospace" }}>{rule.prefixes.map(p => `${p}-`).join(" / ")} 開頭</span>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 14, padding: "10px 12px", background: "#F8F9FF", borderRadius: 8, fontSize: 11, color: "#666", lineHeight: 1.6 }}>
                只顯示儲存地點為 <b>{TARGET_LOCATION}</b> 的庫存。不符合上述分類前綴的型號將不會出現在經銷商畫面。
              </div>
            </div>

            <div style={{ background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 }}>📊 目前資料狀態</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {[
                  { label: "總品項數", value: stats.total },
                  { label: "總庫存台數", value: stats.totalUnits },
                  { label: "庫存不足", value: stats.lowStock },
                  { label: "完全無庫存", value: stats.outOfStock },
                ].map(s => (
                  <div key={s.label} style={{ background: "#F8F9FF", borderRadius: 8, padding: "10px 12px" }}>
                    <div style={{ fontSize: 11, color: "#888" }}>{s.label}</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#1A237E", marginTop: 2 }}>{s.value}</div>
                  </div>
                ))}
              </div>
              {lastUpdated && <div style={{ marginTop: 10, fontSize: 11, color: "#AAAAAA" }}>最後更新時間：{lastUpdated}</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InventoryApp />);
</script>
</body>
</html>
