function getCategory(model) {
  var m = String(model).toUpperCase();
  for (var i = 0; i < PREFIX_RULES.length; i++) {
    var rule = PREFIX_RULES[i];
    for (var j = 0; j < rule.prefixes.length; j++) {
      if (m.indexOf(rule.prefixes[j]) === 0) return rule.category;
    }
  }
  return null;
}

  var hasStock = item.stock > 0;
  var dotColor = hasStock ? "#4CAF50" : "#E53935";
  return h("div", {
    style: {
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "10px 14px", background: "#fff", borderBottom: "1px solid #F0F0F0"

  },
    h("div", { style: { display: "flex", alignItems: "center", gap: 10, minWidth: 0, flex: 1 } },
      h("span", { style: { width: 14, height: 14, borderRadius: "50%", background: dotColor, flexShrink: 0 } }),

}

function LoginForm() {
  var emailState = useState("");
  var email = emailState[0], setEmail = emailState[1];
  var pwState = useState("");
  var pw = pwState[0], setPw = pwState[1];
  var errState = useState("");
  var err = errState[0], setErr = errState[1];
  var busyState = useState(false);
  var busy = busyState[0], setBusy = busyState[1];

  function handleLogin() {
    if (!email || !pw) {
      setErr("請輸入帳號與密碼");
      return;
    }
    setBusy(true);
    setErr("");
    auth.signInWithEmailAndPassword(email, pw).then(function () {
      setBusy(false);
    }).catch(function () {
      setBusy(false);
      setErr("登入失敗，請確認帳號密碼是否正確");
    });

// 經銷商登入身分判斷：回傳 {role, code} 或 null
function resolveDealerIdentity(account) {
  var acc = String(account).trim().toUpperCase();
  // 區域主管：A42 或 A42B~E
  if (acc === "A42") return { role: "hq", code: "A42", label: "台中分公司二課" };
  if (DEALER_AREAS[acc]) return { role: "area", code: acc, label: acc + " 區（業務:" + DEALER_AREAS[acc].sales + "）" };
  // 經銷商：完整代號比對（大小寫不敏感）
  for (var i = 0; i < DEALER_LIST.length; i++) {
    if (DEALER_LIST[i].code.toUpperCase() === acc) {
      return { role: "dealer", code: DEALER_LIST[i].code, label: DEALER_LIST[i].code + " " + DEALER_LIST[i].name, area: DEALER_LIST[i].area };
    }
  }
  return null;
}

function DealerStockForm(props) {
  var identity = props.identity;  // {role:'dealer', code, label, area}
  var stockState = useState(null);  // {model: qty}
  var stock = stockState[0], setStock = stockState[1];
  var customState = useState({});  // {category: [自訂型號]}
  var custom = customState[0], setCustom = customState[1];
  var loadingState = useState(true);
  var loading = loadingState[0], setLoading = loadingState[1];
  var savingState = useState(false);
  var saving = savingState[0], setSaving = savingState[1];
  var msgState = useState("");
  var msg = msgState[0], setMsg = msgState[1];
  var openCatState = useState(null);
  var openCat = openCatState[0], setOpenCat = openCatState[1];

  useEffect(function () {
    DEALER_STOCK_COL.doc(identity.code).get().then(function (doc) {
      var data = doc.exists ? doc.data() : {};
      setStock(data.stock || {});
      setCustom(data.customModels || {});
      setLoading(false);
    }).catch(function () {
      setStock({});
      setCustom({});
      setLoading(false);
    });
  }, [identity.code]);

  function setQty(model, val) {
    var n = val === "" ? "" : Math.max(0, parseInt(val, 10) || 0);
    var next = Object.assign({}, stock);
    next[model] = n;
    setStock(next);
  }

  function addCustomModel(cat) {
    var model = prompt("輸入要新增的「" + cat + "」型號");
    if (!model) return;
    model = model.trim();
    if (!model) return;
    // 檢查是否已存在（內建或自訂）
    var builtin = DEALER_PRODUCTS[cat] || [];
    var existing = builtin.concat(custom[cat] || []);
    if (existing.indexOf(model) !== -1) { alert("此型號已存在"); return; }
    var next = Object.assign({}, custom);
    next[cat] = (next[cat] || []).concat([model]);
    setCustom(next);
  }

  function delCustomModel(cat, model) {
    var next = Object.assign({}, custom);
    next[cat] = (next[cat] || []).filter(function (m) { return m !== model; });
    setCustom(next);
    // 同時清掉該型號的庫存值
    var s = Object.assign({}, stock);
    delete s[model];
    setStock(s);
  }

  function saveAll() {
    setSaving(true);
    setMsg("");
    var clean = {};
    Object.keys(stock).forEach(function (k) {
      clean[k] = stock[k] === "" ? 0 : stock[k];
    });
    var now = new Date().toLocaleString("zh-TW", { hour12: false });
    DEALER_STOCK_COL.doc(identity.code).set({
      code: identity.code, area: identity.area || "", stock: clean, customModels: custom, updatedAt: now
    }).then(function () {
      setSaving(false);
      setMsg("✅ 已儲存店面庫存（" + now + "）");
    }).catch(function () {
      setSaving(false);
      setMsg("❌ 儲存失敗，請稍後再試");
    });
  }

  if (loading) return h("div", { style: { textAlign: "center", padding: "40px", color: "#AAA" } }, "載入中…");

  var cats = Object.keys(DEALER_PRODUCTS);
  var catBlocks = cats.map(function (cat) {
    var builtinModels = DEALER_PRODUCTS[cat];
    var customModels = custom[cat] || [];
    var models = builtinModels.concat(customModels);
    var isOpen = openCat === cat;
    var filledCount = models.filter(function (m) { return stock[m] && stock[m] > 0; }).length;
    return h("div", { key: cat, style: { background: "#fff", borderRadius: 12, marginBottom: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
      h("div", {
        onClick: function () { setOpenCat(isOpen ? null : cat); },
        style: { padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: isOpen ? "#F8F9FF" : "#fff" }
      },
        h("span", { style: { fontWeight: 700, fontSize: 15, color: "#1A237E" } }, cat + "（" + models.length + "）"),
        h("span", { style: { fontSize: 12, color: "#888" } }, "已填 " + filledCount + " 　" + (isOpen ? "▲" : "▼"))
      ),
      isOpen ? h("div", { style: { borderTop: "1px solid #F0F0F0" } },
        models.map(function (m) {
          var isCustom = customModels.indexOf(m) !== -1;
          return h("div", { key: m, style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px", borderBottom: "1px solid #F5F5F5" } },
            h("span", { style: { fontSize: 13, color: "#333", flex: 1, wordBreak: "break-all" } },
              m, isCustom ? h("span", { style: { fontSize: 10, color: "#3949AB", background: "#EEF0FB", borderRadius: 4, padding: "1px 5px", marginLeft: 6 } }, "新增") : null),
            h("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
              h("input", {
                type: "number", min: "0",
                value: stock[m] === undefined ? "" : stock[m],
                onChange: function (e) { setQty(m, e.target.value); },
                placeholder: "0",
                style: { width: 70, textAlign: "center", padding: "7px 8px", borderRadius: 8, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", fontFamily: "inherit" }
              }),
              isCustom ? h("button", { onClick: function () { delCustomModel(cat, m); }, style: { fontSize: 14, color: "#C62828", border: "none", background: "none", cursor: "pointer", padding: "0 2px" } }, "✕") : null
            )
          );
        }),
        h("button", {
          onClick: function () { addCustomModel(cat); },
          style: { width: "100%", padding: "10px", border: "none", borderTop: "1px solid #F0F0F0", background: "#fff", color: "#3949AB", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }
        }, "＋ 新增型號")
      ) : null
    );
  });

  return h("div", null,
    props.hideHeader
      ? h("div", { style: { background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
          h("div", { style: { fontSize: 15, fontWeight: 800, color: "#1A237E" } }, identity.label)
        )
      : h("div", { style: { background: "#fff", borderRadius: 12, padding: "12px 16px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
          h("div", null,
            h("div", { style: { fontSize: 11, color: "#888" } }, "目前登入店面"),
            h("div", { style: { fontSize: 14, fontWeight: 700, color: "#1A237E" } }, identity.label)
          ),
          h("button", {
            onClick: props.onLogout,
            style: { padding: "6px 14px", borderRadius: 8, border: "1.5px solid #E0E0E0", background: "#fff", color: "#C62828", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }
          }, "登出")
        ),
    h("div", { style: { fontSize: 12, color: "#888", marginBottom: 12, lineHeight: 1.6, padding: "0 4px" } }, "點各分類展開後填入店面庫存數量，填好後按底部「儲存」。未填的型號預設為 0。"),
    catBlocks,
    msg ? h("div", { style: { padding: "10px 14px", borderRadius: 8, marginBottom: 10, fontSize: 13, fontWeight: 600, background: msg.indexOf("✅") === 0 ? "#E8F5E9" : "#FFEBEE", color: msg.indexOf("✅") === 0 ? "#2E7D32" : "#C62828" } }, msg) : null,
    h("button", {
      onClick: saveAll, disabled: saving,
      style: { width: "100%", padding: "14px", borderRadius: 10, border: "none", background: "#1A237E", color: "#fff", fontWeight: 700, fontSize: 15, cursor: saving ? "not-allowed" : "pointer", fontFamily: "inherit", marginBottom: 30 }
    }, saving ? "儲存中…" : "💾 儲存店面庫存")
  );
}

// 區域主管 / 管理者彙整檢視
function DealerAreaView(props) {
  var identity = props.identity;  // {role:'area'|'hq', code}
  var allStockState = useState(null);  // {code: {stock, updatedAt}}
  var allStock = allStockState[0], setAllStock = allStockState[1];
  var loadingState = useState(true);
  var loading = loadingState[0], setLoading = loadingState[1];
  var selectedState = useState(null);  // 選中要看哪家經銷商
  var selected = selectedState[0], setSelected = selectedState[1];
  var searchState = useState("");
  var searchInput = searchState[0], setSearchInput = searchState[1];

  useEffect(function () {
    DEALER_STOCK_COL.get().then(function (snap) {
      var map = {};
      snap.forEach(function (doc) { map[doc.id] = doc.data(); });
      setAllStock(map);
      setLoading(false);
    }).catch(function () {
      setAllStock({});
      setLoading(false);
    });
  }, []);

  // 決定這個身分能看哪些經銷商
  var visibleDealers = DEALER_LIST.filter(function (d) {
    if (identity.role === "hq") return true;        // A42 看全部
    if (identity.role === "area") return d.area === identity.code;  // 區域看自己區
    return false;
  });

  if (loading) return h("div", { style: { textAlign: "center", padding: "40px", color: "#AAA" } }, "載入中…");

  // 若選了某家經銷商，顯示可編輯的填庫存介面（區域主管/總部可代為調整）
  if (selected) {
    var dealerIdentity = {
      role: "dealer",
      code: selected.code,
      label: selected.code + " " + selected.name + "（由" + (identity.role === "hq" ? "總管理" : identity.code + "區") + "代為調整）",
      area: selected.area
    };
    return h("div", null,
      h("button", {

        style: { marginBottom: 12, padding: "8px 14px", borderRadius: 8, border: "1.5px solid #E0E0E0", background: "#fff", color: "#1A237E", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }
      }, "← 返回列表"),
      h(DealerStockForm, { identity: dealerIdentity, hideHeader: true })
    );

  // 已填庫存、且在可見範圍內的經銷商
  var filledDealers = [];
  visibleDealers.forEach(function (d) {
    if (allStock && allStock[d.code]) {
      var rec = allStock[d.code];
      var hasStock = rec.stock && Object.keys(rec.stock).some(function (k) { return rec.stock[k] > 0; });

    }
  });

  // 搜尋符合的經銷商（用來新建/編輯）

var CONSIGN_COL = db.collection("consignment");

// 解析寄倉 Excel（多月份分頁）成 JSON
function parseConsignmentWorkbook(wb) {
  var months = [];
  wb.SheetNames.forEach(function (sheetName) {
    var ws = wb.Sheets[sheetName];
    var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
    // 找標題列（含"機型"）
    var headerRow = -1;
    for (var r = 0; r < Math.min(5, rows.length); r++) {
      if (String(rows[r][0]).trim() === "機型") { headerRow = r; break; }
    }
    if (headerRow === -1) return;
    var items = [];
    for (var r2 = headerRow + 1; r2 < rows.length; r2++) {
      var model = String(rows[r2][0] || "").trim();
      if (!model) continue;
      var base = parseInt(rows[r2][1], 10); if (isNaN(base)) base = 0;
      var final = parseInt(rows[r2][13], 10); if (isNaN(final)) final = 0;
      var moves = [];
      for (var c = 2; c < 13; c += 2) {
        var date = rows[r2][c], qty = rows[r2][c + 1];
        if (date !== "" && date != null && qty !== "" && qty != null) {
          var dstr = String(date).split(" ")[0].split("T")[0];
          moves.push({ date: dstr, qty: String(qty) });
        }
      }
      items.push({ model: model, base: base, final: final, moves: moves });
    }
    months.push({ month: sheetName, items: items });
  });
  return months;
}

var PRICE_COL = db.collection("priceList");

// 解析價格表 Excel（多分頁，每頁欄位位置不同，用標題比對）
// 各分頁要額外顯示在機型下方的規格欄位（用標題文字比對）
var PRICE_SPEC_FIELDS = {
  "影音商品": ["尺寸(mm)", "備註", "4K / 2K", "面板", "AI", "AirPlay 2", "刷新率", "聲音", "雙杜比", "雙動態", "雙娛樂", "藍芽", "Wifi", "HDMI", "USB", "台製"],
  "冰箱": ["機體尺寸", "能效", "節能", "環保", "MIT", "容量", "顏色"],
  "洗衣機": ["尺寸(mm)", "公斤帶", "含宅安", "智慧", "變頻", "PICO", "超震波", "省水", "節能", "環保", "MIT", "產地"],
  "冷凍櫃": ["尺寸(mm)", "說明", "節能", "容量", "顏色"],
  "除濕機": ["尺寸(mm)", "功能"]
};

function parsePriceWorkbook(wb) {
  var sheets = [];
  wb.SheetNames.forEach(function (sheetName) {
    var ws = wb.Sheets[sheetName];
    var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
    // 找標題列（含"機型"）
    var hr = -1;
    for (var r = 0; r < Math.min(6, rows.length); r++) {
      var rowJoined = rows[r].map(function (x) { return String(x).replace(/\n/g, ""); });
      if (rowJoined.indexOf("機型") !== -1) { hr = r; break; }
    }
    if (hr === -1) return;
    var headerRaw = rows[hr].map(function (x) { return String(x).replace(/\n/g, " ").trim(); });
    var header = rows[hr].map(function (x) { return String(x).replace(/\n/g, ""); });
    function findCol(names) {
      for (var i = 0; i < header.length; i++) {
        for (var n = 0; n < names.length; n++) {
          if (header[i].indexOf(names[n]) !== -1) return i;
        }
      }
      return -1;
    }
    var cModel = findCol(["機型"]);
    var cCat = findCol(["產品別"]);
    var cBase = findCol(["批價"]);
    var cPromo = findCol(["本月特促", "特促"]);
    var cSuggest = findCol(["建議售價", "建議"]);
    var cPrice = -1;
    for (var ip = 0; ip < header.length; ip++) { if (header[ip] === "售價") { cPrice = ip; break; } }

    // 額外規格欄位（用標題文字比對）
    var specDefs = [];
    var wanted = PRICE_SPEC_FIELDS[sheetName];
    if (wanted) {
      wanted.forEach(function (key) {
        for (var ci = 0; ci < header.length; ci++) {
          if (ci === cModel || ci === cCat || ci === cBase || ci === cPromo || ci === cSuggest || ci === cPrice) continue;
          if (header[ci].indexOf(key) !== -1) {
            var dup = specDefs.some(function (s) { return s.col === ci; });
            if (!dup) specDefs.push({ col: ci, label: headerRaw[ci] || key });
            break;
          }
        }
      });
    }

    var items = [];
    var curCat = "";
    for (var r2 = hr + 1; r2 < rows.length; r2++) {
      var row = rows[r2];
      var model = String(row[cModel] || "").replace(/\n/g, " ").trim();
      if (!model) continue;
      var cat = cCat >= 0 ? String(row[cCat] || "").replace(/\n/g, "").trim() : "";
      if (cat) curCat = cat;
      function val(ci) { return ci >= 0 ? String(row[ci] || "").replace(/\n/g, " ").trim() : ""; }
      var specs = [];
      specDefs.forEach(function (sd) {
        var v = String(row[sd.col] || "").replace(/\n/g, " ").trim();
        if (v) specs.push({ label: sd.label, value: v });
      });
      items.push({
        model: model,
        cat: curCat,
        base: val(cBase),
        promo: val(cPromo),
        suggest: val(cSuggest),
        price: val(cPrice),
        specs: specs
      });
    }
    if (items.length > 0) sheets.push({ name: sheetName, items: items });
  });
  return sheets;
}

  );
}

// 寄倉表網頁編輯器（管理者/區域主管可用）
function ConsignmentEditor(props) {
  var code = props.code;
  var dealerName = props.dealerName || "";
  var monthsState = useState(null);
  var months = monthsState[0], setMonths = monthsState[1];
  var consignCodeState = useState("");
  var consignCode = consignCodeState[0], setConsignCode = consignCodeState[1];
  var loadingState = useState(true);
  var loading = loadingState[0], setLoading = loadingState[1];
  var savingState = useState(false);
  var saving = savingState[0], setSaving = savingState[1];
  var msgState = useState("");
  var msg = msgState[0], setMsg = msgState[1];
  var openMonthState = useState(null);
  var openMonth = openMonthState[0], setOpenMonth = openMonthState[1];

  useEffect(function () {
    CONSIGN_COL.doc(code).get().then(function (doc) {
      var data = doc.exists ? doc.data() : {};
      var m = data.months ? data.months : [];
      setMonths(m);
      setConsignCode(data.consignCode || "");
      if (m.length > 0) setOpenMonth(m[m.length - 1].month);
      setLoading(false);
    }).catch(function () { setMonths([]); setLoading(false); });
  }, [code]);

  function clone(x) { return JSON.parse(JSON.stringify(x)); }

  function addMonth() {
    var name = prompt("輸入月份（格式 YYYY-MM，例如 2026-07）");
    if (!name) return;
    name = name.trim();
    if (months.some(function (m) { return m.month === name; })) { alert("該月份已存在"); return; }
    var next = clone(months);
    next.push({ month: name, items: [] });
    next.sort(function (a, b) { return a.month.localeCompare(b.month); });
    setMonths(next);
    setOpenMonth(name);
  }

  function delMonth(monthName) {
    if (!confirm("確定刪除 " + monthName + " 整個月份？")) return;
    setMonths(months.filter(function (m) { return m.month !== monthName; }));
  }

  function addModel(monthName) {
    var model = prompt("輸入機型名稱");
    if (!model) return;
    model = model.trim();
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    if (mObj.items.some(function (it) { return it.model === model; })) { alert("該機型已存在"); return; }
    mObj.items.push({ model: model, base: 0, final: 0, moves: [] });
    setMonths(next);
  }

  function delModel(monthName, model) {
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    mObj.items = mObj.items.filter(function (it) { return it.model !== model; });
    setMonths(next);
  }

  function recalcFinal(it) {
    var inSum = 0, outSum = 0;
    it.moves.forEach(function (mv) {
      var q = parseInt(mv.qty, 10) || 0;
      if (mv.type === "out") outSum += q; else inSum += q;
    });
    it.final = (parseInt(it.base, 10) || 0) + inSum - outSum;
  }

  function updateField(monthName, model, field, val) {
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    var it = mObj.items.find(function (x) { return x.model === model; });
    if (field === "base") {
      it.base = val === "" ? 0 : (parseInt(val, 10) || 0);
      it.finalManual = false;
      recalcFinal(it);
    } else if (field === "final") {
      it.final = val === "" ? 0 : (parseInt(val, 10) || 0);
      it.finalManual = true;  // 手動覆蓋
    }
    setMonths(next);
  }

  function addMove(monthName, model) {
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    var it = mObj.items.find(function (x) { return x.model === model; });
    it.moves.push({ date: "", qty: "", type: "in", who: "" });
    setMonths(next);
  }

  function updateMove(monthName, model, idx, field, val) {
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    var it = mObj.items.find(function (x) { return x.model === model; });
    it.moves[idx][field] = val;
    it.finalManual = false;
    recalcFinal(it);
    setMonths(next);
  }

  function delMove(monthName, model, idx) {
    var next = clone(months);
    var mObj = next.find(function (m) { return m.month === monthName; });
    var it = mObj.items.find(function (x) { return x.model === model; });
    it.moves.splice(idx, 1);
    it.finalManual = false;
    recalcFinal(it);
    setMonths(next);
  }

  function saveAll() {
    setSaving(true); setMsg("");
    var now = new Date().toLocaleString("zh-TW", { hour12: false });
    CONSIGN_COL.doc(code).set({ code: code, name: dealerName, consignCode: consignCode, months: months, updatedAt: now }).then(function () {
      setSaving(false); setMsg("✅ 已儲存（" + now + "）");
    }).catch(function () { setSaving(false); setMsg("❌ 儲存失敗"); });
  }

  if (loading) return h("div", { style: { textAlign: "center", padding: "40px", color: "#AAA" } }, "載入中…");

  var inputS = { padding: "6px 8px", borderRadius: 6, border: "1.5px solid #E0E0E0", fontSize: 13, outline: "none", fontFamily: "inherit", boxSizing: "border-box" };

  return h("div", null,
    h("div", { style: { background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
      h("div", { style: { fontSize: 12, color: "#888", marginBottom: 6 } }, "寄倉代號"),
      h("input", {
        value: consignCode, onChange: function (e) { setConsignCode(e.target.value); },
        placeholder: "例如 G1FM",
        style: { width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 8, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", fontFamily: "inherit" }
      })
    ),
    h("button", {
      onClick: addMonth,
      style: { width: "100%", padding: "12px", borderRadius: 10, border: "2px dashed #3949AB", background: "#EEF0FB", color: "#3949AB", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit", marginBottom: 12 }
    }, "＋ 新增月份"),

    months.length === 0 ? h("div", { style: { textAlign: "center", padding: "30px", color: "#AAA", fontSize: 13 } }, "尚無月份，請先新增") : null,

    months.map(function (m) {
      var isOpen = openMonth === m.month;
      return h("div", { key: m.month, style: { background: "#fff", borderRadius: 12, marginBottom: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
        h("div", { style: { padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", background: isOpen ? "#F8F9FF" : "#fff" } },
          h("span", { onClick: function () { setOpenMonth(isOpen ? null : m.month); }, style: { fontWeight: 700, fontSize: 15, color: "#1A237E", cursor: "pointer", flex: 1 } }, m.month + "（" + m.items.length + " 機型）" + (isOpen ? " ▲" : " ▼")),
          h("button", { onClick: function () { delMonth(m.month); }, style: { fontSize: 11, color: "#C62828", border: "none", background: "none", cursor: "pointer", fontFamily: "inherit" } }, "刪除月")
        ),
        isOpen ? h("div", { style: { borderTop: "1px solid #F0F0F0", padding: "12px 14px" } },
          m.items.map(function (it) {
            return h("div", { key: it.model, style: { border: "1px solid #EEE", borderRadius: 8, padding: "10px 12px", marginBottom: 10 } },
              h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
                h("span", { style: { fontWeight: 700, fontSize: 14, color: "#1A1A2E", wordBreak: "break-all" } }, it.model),
                h("button", { onClick: function () { delModel(m.month, it.model); }, style: { fontSize: 11, color: "#C62828", border: "none", background: "none", cursor: "pointer", fontFamily: "inherit", flexShrink: 0 } }, "✕ 刪除")
              ),
              h("div", { style: { display: "flex", gap: 8, marginBottom: 8 } },
                h("div", { style: { flex: 1 } },
                  h("div", { style: { fontSize: 11, color: "#888", marginBottom: 2 } }, "月初結存"),
                  h("input", { type: "number", value: it.base, onChange: function (e) { updateField(m.month, it.model, "base", e.target.value); }, style: Object.assign({}, inputS, { width: "100%" }) })
                ),
                h("div", { style: { flex: 1 } },
                  h("div", { style: { fontSize: 11, color: "#888", marginBottom: 2 } }, "結餘", h("span", { style: { color: "#3949AB" } }, "（自動算）")),
                  h("input", { type: "number", value: it.final, onChange: function (e) { updateField(m.month, it.model, "final", e.target.value); }, style: Object.assign({}, inputS, { width: "100%" }) })
                )
              ),
              h("div", { style: { fontSize: 11, color: "#888", marginBottom: 4 } }, "進出庫明細"),
              it.moves.map(function (mv, idx) {
                var isOut = mv.type === "out";
                return h("div", { key: idx, style: { border: "1px solid #F0F0F0", borderRadius: 8, padding: "8px", marginBottom: 8 } },
                  h("div", { style: { display: "flex", gap: 6, marginBottom: 6, alignItems: "center" } },
                    h("button", {
                      onClick: function () { updateMove(m.month, it.model, idx, "type", isOut ? "in" : "out"); },
                      style: { padding: "6px 10px", borderRadius: 6, border: "none", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit", flexShrink: 0, background: isOut ? "#FFEBEE" : "#E8F5E9", color: isOut ? "#C62828" : "#2E7D32" }
                    }, isOut ? "出庫" : "入庫"),
                    h("input", { type: "date", value: mv.date, onChange: function (e) { updateMove(m.month, it.model, idx, "date", e.target.value); }, style: Object.assign({}, inputS, { flex: 1 }) }),
                    h("input", { type: "number", value: mv.qty, onChange: function (e) { updateMove(m.month, it.model, idx, "qty", e.target.value); }, placeholder: "數量", style: Object.assign({}, inputS, { width: 60 }) }),
                    h("button", { onClick: function () { delMove(m.month, it.model, idx); }, style: { fontSize: 14, color: "#C62828", border: "none", background: "none", cursor: "pointer", flexShrink: 0 } }, "✕")
                  ),
                  isOut ? h("input", { value: mv.who || "", onChange: function (e) { updateMove(m.month, it.model, idx, "who", e.target.value); }, placeholder: "借誰（出庫對象）", style: Object.assign({}, inputS, { width: "100%" }) }) : null
                );
              }),
              h("button", { onClick: function () { addMove(m.month, it.model); }, style: { fontSize: 12, color: "#3949AB", border: "1px solid #C5CAE9", background: "#fff", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", marginTop: 2 } }, "＋ 加一筆進出庫")
            );
          }),
          h("button", { onClick: function () { addModel(m.month); }, style: { width: "100%", padding: "10px", borderRadius: 8, border: "1.5px dashed #3949AB", background: "#fff", color: "#3949AB", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit", marginTop: 4 } }, "＋ 新增機型")
        ) : null
      );
    }),

    msg ? h("div", { style: { padding: "10px 14px", borderRadius: 8, margin: "10px 0", fontSize: 13, fontWeight: 600, background: msg.indexOf("✅") === 0 ? "#E8F5E9" : "#FFEBEE", color: msg.indexOf("✅") === 0 ? "#2E7D32" : "#C62828" } }, msg) : null,

    h("button", {
      onClick: saveAll, disabled: saving,
      style: { width: "100%", padding: "14px", borderRadius: 10, border: "none", background: "#1A237E", color: "#fff", fontWeight: 700, fontSize: 15, cursor: saving ? "not-allowed" : "pointer", fontFamily: "inherit", marginTop: 8, marginBottom: 30 }
    }, saving ? "儲存中…" : "💾 儲存寄倉表")
  );
}


// 寄倉表系統容器（登入後檢視寄倉表）
function ConsignmentSystem() {
  var identityState = useState(null);
  var identity = identityState[0], setIdentity = identityState[1];
  var selectedState = useState(null);
  var selected = selectedState[0], setSelected = selectedState[1];
  var editModeState = useState(false);
  var editMode = editModeState[0], setEditMode = editModeState[1];
  var existingState = useState(null);  // 已建立寄倉的經銷商 {code: {name, consignCode, updatedAt}}
  var existing = existingState[0], setExisting = existingState[1];
  var searchState = useState("");
  var searchInput = searchState[0], setSearchInput = searchState[1];

  useEffect(function () {
    if (!identity || identity.role === "dealer") return;
    CONSIGN_COL.get().then(function (snap) {
      var map = {};
      snap.forEach(function (doc) {
        var d = doc.data();
        // 只收錄真的有內容的：至少一個月份、且該月份有型號
        var hasContent = d.months && d.months.length > 0 && d.months.some(function (m) {
          return m.items && m.items.length > 0;
        });
        if (hasContent) {
          map[doc.id] = { name: d.name || "", consignCode: d.consignCode || "", updatedAt: d.updatedAt || "" };
        }
      });
      setExisting(map);
    }).catch(function () { setExisting({}); });
  }, [identity]);

  if (!identity) {
    return h(DealerLogin, { onLogin: function (id) { setIdentity(id); }, title: "📦 寄倉表查詢登入" });
  }
  var logout = function () { setIdentity(null); setSelected(null); setEditMode(false); };

  // 經銷商：直接看自己的寄倉表
  if (identity.role === "dealer") {
    return h("div", null,
      h("div", { style: { background: "#fff", borderRadius: 12, padding: "12px 16px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" } },
        h("div", null,
          h("div", { style: { fontSize: 11, color: "#888" } }, "寄倉表"),
          h("div", { style: { fontSize: 14, fontWeight: 700, color: "#1A237E" } }, identity.label)
        ),
        h("button", { onClick: logout, style: { padding: "6px 14px", borderRadius: 8, border: "1.5px solid #E0E0E0", background: "#fff", color: "#C62828", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" } }, "登出")
      ),
      h(ConsignmentView, { code: identity.code })
    );

function InventoryApp() {

  var userState = useState(null);

  var authLoadingState = useState(true);
  var authLoading = authLoadingState[0], setAuthLoading = authLoadingState[1];

  var fileRef = useRef();

  useEffect(function () {
    var unsubscribeAuth = auth.onAuthStateChanged(function (user) {
      setCurrentUser(user || null);
      setAuthLoading(false);
    });
    return function () { unsubscribeAuth(); };
  }, []);

  function handleLogout() {
    auth.signOut();
    setTab("查詢");
  }

  useEffect(function () {
    var unsubscribe = DOC_REF.onSnapshot(
      function (doc) {
        if (doc.exists) {
          var payload = doc.data();
          setData(payload.items || []);
          setLastUpdated(payload.updatedAt || null);
        } else {
          setData([]);
        }
        setLoading(false);
      },
      function (err) {
        console.error("讀取失敗", err);
        setLoading(false);
      }
    );
    return function () { unsubscribe(); };
  }, []);

  var categories = ["全部"].concat(CATEGORY_LIST);

  // 將搜尋字串展開成多個比對關鍵字。
  // 支援 "AU/AM-HF28D" 這種語法 -> ["au-hf28d", "am-hf28d"]
  function expandSearchTerms(raw) {
    var q = raw.trim().toLowerCase();
    if (!q) return [];
    var slashIdx = q.indexOf("/");
    if (slashIdx === -1) return [q];

    // 嘗試找出 "/" 之後、下一個"-"之前的共同後段
    // 例如 "au/am-hf28d" -> prefixes: ["au","am"], suffix: "hf28d"
    var afterSlash = q.slice(slashIdx + 1);
    var dashIdx = afterSlash.indexOf("-");
    if (dashIdx === -1) {
      // 沒有共同後段，單純把每個用 / 分隔的詞都當作關鍵字
      return q.split("/").map(function (s) { return s.trim(); }).filter(Boolean);
    }
    var firstPrefix = q.slice(0, slashIdx);
    var secondPrefix = afterSlash.slice(0, dashIdx);
    var suffix = afterSlash.slice(dashIdx); // 包含開頭的 "-"
    return [firstPrefix + suffix, secondPrefix + suffix];
  }

  var filtered = useMemo(function () {
    var terms = expandSearchTerms(search);
    return data.filter(function (item) {
      var modelLower = item.model.toLowerCase();
      var matchSearch = terms.length === 0 || terms.some(function (t) { return modelLower.indexOf(t) !== -1; });
      var matchCat = categoryFilter === "全部" || item.category === categoryFilter;
      return matchSearch && matchCat;
    });
  }, [data, search, categoryFilter]);

  var alertItems = data.filter(function (i) { return i.stock < i.threshold; });

  var stats = {
    total: data.length,
    lowStock: data.filter(function (i) { return i.stock > 0 && i.stock < i.threshold; }).length,
    outOfStock: data.filter(function (i) { return i.stock === 0; }).length,
    totalUnits: data.reduce(function (a, b) { return a + b.stock; }, 0)
  };

  function handleFileUpload(e) {
    var file = e.target.files[0];
    if (!file) return;
    setIsUploading(true);
    setUploadMsg("");

    var reader = new FileReader();
    reader.onload = function (evt) {
      try {
        var wb = XLSX.read(evt.target.result, { type: "binary" });
        var sheetName = wb.SheetNames.indexOf("庫存原始檔") !== -1 ? "庫存原始檔" : wb.SheetNames[0];
        var ws = wb.Sheets[sheetName];
        var rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

        if (!rows.length) {
          setUploadMsg("❌ 檔案沒有資料，請確認格式是否正確");
          setIsUploading(false);
          return;
        }

        var matched = {};
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          var loc = String(row["儲存地點"] != null ? row["儲存地點"] : "").trim();
          if (loc !== TARGET_LOCATION) continue;

          var model = String(row["物料"] != null ? row["物料"] : "").trim();
          if (!model) continue;

          var category = getCategory(model);
          if (!category) continue;

          var qty = Number(row["未限制"] != null ? row["未限制"] : 0) || 0;

          if (!matched[model]) {
            matched[model] = { model: model, category: category, baseStock: 0, adjustment: 0, stock: 0, threshold: DEFAULT_THRESHOLD[category] || 5 };
          }
          matched[model].baseStock += qty;
          matched[model].stock += qty;
        }

        var items = Object.keys(matched).map(function (k) { return matched[k]; });
        items.sort(function (a, b) {
          if (a.category === b.category) return a.model.localeCompare(b.model);
          return a.category.localeCompare(b.category);
        });

        if (!items.length) {
          setUploadMsg("❌ 在儲位 " + TARGET_LOCATION + " 中找不到符合分類的型號，請確認檔案內容");
          setIsUploading(false);
          return;
        }

        var now = new Date().toLocaleString("zh-TW", { hour12: false });

        DOC_REF.set({ items: items, updatedAt: now }).then(function () {
          setUploadMsg("✅ 成功更新 " + items.length + " 項產品（儲位 " + TARGET_LOCATION + "），經銷商重新整理頁面即可看到");
          setIsUploading(false);
        }).catch(function (err) {
          console.error(err);
          setUploadMsg("❌ 上傳到雲端失敗，請確認網路連線或 Firebase 設定");
          setIsUploading(false);
        });
      } catch (err) {
        console.error(err);
        setUploadMsg("❌ 解析失敗，請確認上傳的是正確的 SAP 庫存表");
        setIsUploading(false);
      }
    };
    reader.readAsBinaryString(file);
    e.target.value = "";
  }

  function handleAdjust(model, delta, mode) {
    return DOC_REF.get().then(function (doc) {
      var payload = doc.exists ? doc.data() : { items: [] };
      var items = payload.items || [];
      var found = null;
      for (var i = 0; i < items.length; i++) {
        if (items[i].model === model) { found = items[i]; break; }
      }
      if (!found) {
        throw new Error("找不到型號");
      }
      // 相容舊資料：若沒有 baseStock，視 stock 為原始庫存
      if (found.baseStock === undefined) {
        found.baseStock = found.stock || 0;
        found.adjustment = 0;
      }
      if (mode === "set") {
        found.adjustment = delta;
      } else {
        found.adjustment = (found.adjustment || 0) + delta;
      }
      found.stock = found.baseStock + found.adjustment;
      if (found.stock < 0) found.stock = 0;

      var now = new Date().toLocaleString("zh-TW", { hour12: false });
      return DOC_REF.set({ items: items, updatedAt: now }).then(function () {
        return found.stock;

          }
        }, isUploading ? "⏳ 解析並上傳中…" : "📁 每日上傳庫存表"),
        h("input", { ref: fileRef, type: "file", accept: ".xlsx,.xls,.xlsm", onChange: handleFileUpload, style: { display: "none" } }),
        uploadMsg ? h("div", {
          style: {
            marginTop: 12, padding: "10px 14px", borderRadius: 8,
            background: uploadMsg.indexOf("✅") === 0 ? "#E8F5E9" : "#FFEBEE",
            color: uploadMsg.indexOf("✅") === 0 ? "#2E7D32" : "#C62828",
            fontSize: 13, fontWeight: 600, lineHeight: 1.5
          }
        }, uploadMsg) : null
      ),
      h(PriceListUpload),
      h(ConsignmentUpload),
      h(AdjustPanel, { data: data, onApply: handleAdjust }),
      h(AdjustedList, { data: data, onApply: handleAdjust }),
      h("div", { style: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 } }, "📋 自動分類規則"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } }, ruleRows),
        h("div", { style: { marginTop: 14, padding: "10px 12px", background: "#F8F9FF", borderRadius: 8, fontSize: 11, color: "#666", lineHeight: 1.6 } },
          "只顯示儲存地點為 " + TARGET_LOCATION + " 的庫存。不符合上述分類前綴的型號將不會出現在經銷商畫面。"
        )
      ),
      h("div", { style: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 } }, "📊 目前資料狀態"),
        h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } }, statBoxes),
        lastUpdated ? h("div", { style: { marginTop: 10, fontSize: 11, color: "#AAAAAA" } }, "最後更新時間：" + lastUpdated) : null
      )
    );
  }

  // ── 經銷商分頁內容 ──
  var dealerContent = null;
  if (tab === "經銷商") {
    dealerContent = h(DealerSystem);
  }

  // ── 寄倉表分頁內容 ──
  var consignContent = null;
  if (tab === "寄倉") {
    consignContent = h(ConsignmentSystem);
  }

  // ── 價格表分頁內容 ──
  var priceContent = null;
  if (tab === "價格") {
    priceContent = h(PriceListSystem);
  }

  var bodyContent;
  if (tab === "價格") bodyContent = priceContent;
  else if (tab === "寄倉") bodyContent = consignContent;
  else if (tab === "經銷商") bodyContent = dealerContent;
  else if (tab === "管理") bodyContent = manageContent;
  else bodyContent = queryContent;

  var needLoading = (tab === "管理") && loading;

  return h("div", { style: { minHeight: "100vh", background: "#F2F4F8", maxWidth: 480, margin: "0 auto" } },
    header,
    h("div", { style: { padding: "16px 16px 40px" } },
      needLoading ? h("div", { style: { textAlign: "center", padding: "60px 20px", color: "#AAAAAA" } }, "載入中…") : bodyContent
    )
  );
}

try {
  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(InventoryApp));
} catch (e) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  box.textContent = "渲染時發生錯誤：\n" + e.message + "\n" + (e.stack || "");
}
</script>
</body>
</html>
