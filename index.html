<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>聲寶家電庫存查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F2F4F8; font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif; }
  #error-box { display:none; padding:20px; color:#C62828; font-size:14px; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="root"></div>
<div id="error-box"></div>

<script>
window.addEventListener("error", function (e) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  var detail = e.message + "\n(" + e.filename + ":" + e.lineno + ":" + e.colno + ")";
  if (e.error && e.error.stack) {
    detail += "\n\nStack:\n" + e.error.stack;
  }
  box.textContent = "頁面發生錯誤：\n" + detail;
});
</script>

<script>
window.addEventListener("unhandledrejection", function (e) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  box.textContent = (box.textContent || "") + "\n\n未處理的 Promise 錯誤：\n" + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
});
</script>

<script>
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var useRef = React.useRef;

// ── Firebase 設定 ──────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyBXKXp7JWpjopZUV01nfN1GvWWpe2LOsuQ",
  authDomain: "sampo-58f06.firebaseapp.com",
  projectId: "sampo-58f06",
  storageBucket: "sampo-58f06.firebasestorage.app",
  messagingSenderId: "476808643013",
  appId: "1:476808643013:web:f170a4300497cd4b5a8bac",
  measurementId: "G-XXWR0HQE89"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();
var DOC_REF = db.collection("inventory").doc("current");

// ── 設定 ──────────────────────────────────────────────────────
var TARGET_LOCATION = "4326";

var PREFIX_RULES = [
  { prefixes: ["EM", "QM"], category: "電視" },
  { prefixes: ["SRF"],      category: "冷凍櫃" },
  { prefixes: ["SR"],       category: "冰箱" },
  { prefixes: ["ES"],       category: "洗衣機" },
  { prefixes: ["AU"],       category: "冷氣室外機" },
  { prefixes: ["AM"],       category: "冷氣室內機" }
];

function getCategory(model) {
  var m = String(model).toUpperCase();
  for (var i = 0; i < PREFIX_RULES.length; i++) {
    var rule = PREFIX_RULES[i];
    for (var j = 0; j < rule.prefixes.length; j++) {
      if (m.indexOf(rule.prefixes[j]) === 0) return rule.category;
    }
  }
  return null;
}

var CATEGORY_LIST = ["電視", "冰箱", "冷凍櫃", "洗衣機", "冷氣室外機", "冷氣室內機"];

var CATEGORY_COLORS = {
  "電視":      { bg: "#F3E5F5", text: "#6A1B9A", dot: "#9C27B0" },
  "冰箱":      { bg: "#E8F5E9", text: "#2E7D32", dot: "#4CAF50" },
  "冷凍櫃":    { bg: "#E1F5FE", text: "#0277BD", dot: "#03A9F4" },
  "洗衣機":    { bg: "#FFF3E0", text: "#E65100", dot: "#FF9800" },
  "冷氣室外機": { bg: "#E8F4FD", text: "#1A6B9A", dot: "#2196F3" },
  "冷氣室內機": { bg: "#E0F7FA", text: "#00695C", dot: "#00BCD4" }
};

var DEFAULT_THRESHOLD = {
  "電視": 10, "冰箱": 10, "冷凍櫃": 10, "洗衣機": 10, "冷氣室外機": 5, "冷氣室內機": 5
};

// ── 小元件 ────────────────────────────────────────────────────
function ProductRow(props) {
  var item = props.item;
  var cat = CATEGORY_COLORS[item.category] || { dot: "#999" };
  var hasStock = item.stock > 0;
  return h("div", {
    style: {
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "10px 14px", background: "#fff", borderBottom: "1px solid #F0F0F0"
    }
  },
    h("div", { style: { display: "flex", alignItems: "center", gap: 8, minWidth: 0, flex: 1 } },
      h("span", { style: { width: 8, height: 8, borderRadius: "50%", background: cat.dot, flexShrink: 0 } }),
      h("span", { style: { fontSize: 14, fontWeight: 600, color: "#1A1A2E", wordBreak: "break-all" } }, item.model)
    ),
    h("span", {
      style: { fontSize: 18, fontWeight: 800, marginLeft: 12, flexShrink: 0, color: hasStock ? "#2E7D32" : "#C62828" }
    }, item.stock)
  );
}

function LoginForm() {
  var emailState = useState("");
  var email = emailState[0], setEmail = emailState[1];
  var pwState = useState("");
  var pw = pwState[0], setPw = pwState[1];
  var errState = useState("");
  var err = errState[0], setErr = errState[1];
  var busyState = useState(false);
  var busy = busyState[0], setBusy = busyState[1];

  function handleLogin() {
    if (!email || !pw) {
      setErr("請輸入帳號與密碼");
      return;
    }
    setBusy(true);
    setErr("");
    auth.signInWithEmailAndPassword(email, pw).then(function () {
      setBusy(false);
    }).catch(function () {
      setBusy(false);
      setErr("登入失敗，請確認帳號密碼是否正確");
    });
  }

  return h("div", { style: { background: "#fff", borderRadius: 14, padding: 24, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
    h("div", { style: { fontWeight: 800, fontSize: 16, color: "#1A237E", marginBottom: 4 } }, "🔒 管理者登入"),
    h("div", { style: { fontSize: 12, color: "#888", marginBottom: 16 } }, "請輸入管理者帳號密碼以進入管理頁面"),
    h("input", {
      type: "email",
      value: email,
      onChange: function (e) { setEmail(e.target.value); },
      placeholder: "電子郵件",
      style: {
        width: "100%", boxSizing: "border-box", padding: "11px 12px", marginBottom: 10,
        borderRadius: 10, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", fontFamily: "inherit"
      }
    }),
    h("input", {
      type: "password",
      value: pw,
      onChange: function (e) { setPw(e.target.value); },
      placeholder: "密碼",
      onKeyDown: function (e) { if (e.key === "Enter") handleLogin(); },
      style: {
        width: "100%", boxSizing: "border-box", padding: "11px 12px", marginBottom: 14,
        borderRadius: 10, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", fontFamily: "inherit"
      }
    }),
    err ? h("div", { style: { color: "#C62828", fontSize: 12, marginBottom: 10 } }, err) : null,
    h("button", {
      onClick: handleLogin,
      disabled: busy,
      style: {
        width: "100%", padding: "12px", borderRadius: 10, border: "none",
        background: "#1A237E", color: "#fff", fontWeight: 700, fontSize: 14,
        cursor: busy ? "not-allowed" : "pointer", fontFamily: "inherit"
      }
    }, busy ? "登入中…" : "登入")
  );
}


function InventoryApp() {
  var dataState = useState([]);
  var data = dataState[0], setData = dataState[1];

  var lastUpdatedState = useState(null);
  var lastUpdated = lastUpdatedState[0], setLastUpdated = lastUpdatedState[1];

  var loadingState = useState(true);
  var loading = loadingState[0], setLoading = loadingState[1];

  var searchState = useState("");
  var search = searchState[0], setSearch = searchState[1];

  var categoryFilterState = useState("全部");
  var categoryFilter = categoryFilterState[0], setCategoryFilter = categoryFilterState[1];

  var tabState = useState("查詢");
  var tab = tabState[0], setTab = tabState[1];

  var uploadMsgState = useState("");
  var uploadMsg = uploadMsgState[0], setUploadMsg = uploadMsgState[1];

  var isUploadingState = useState(false);
  var isUploading = isUploadingState[0], setIsUploading = isUploadingState[1];

  var userState = useState(null);
  var currentUser = userState[0], setCurrentUser = userState[1];

  var authLoadingState = useState(true);
  var authLoading = authLoadingState[0], setAuthLoading = authLoadingState[1];

  var fileRef = useRef();

  useEffect(function () {
    var unsubscribeAuth = auth.onAuthStateChanged(function (user) {
      setCurrentUser(user || null);
      setAuthLoading(false);
    });
    return function () { unsubscribeAuth(); };
  }, []);

  function handleLogout() {
    auth.signOut();
    setTab("查詢");
  }

  useEffect(function () {
    var unsubscribe = DOC_REF.onSnapshot(
      function (doc) {
        if (doc.exists) {
          var payload = doc.data();
          setData(payload.items || []);
          setLastUpdated(payload.updatedAt || null);
        } else {
          setData([]);
        }
        setLoading(false);
      },
      function (err) {
        console.error("讀取失敗", err);
        setLoading(false);
      }
    );
    return function () { unsubscribe(); };
  }, []);

  var categories = ["全部"].concat(CATEGORY_LIST);

  var filtered = useMemo(function () {
    return data.filter(function (item) {
      var q = search.trim().toLowerCase();
      var matchSearch = !q || item.model.toLowerCase().indexOf(q) !== -1;
      var matchCat = categoryFilter === "全部" || item.category === categoryFilter;
      return matchSearch && matchCat;
    });
  }, [data, search, categoryFilter]);

  var alertItems = data.filter(function (i) { return i.stock < i.threshold; });

  var stats = {
    total: data.length,
    lowStock: data.filter(function (i) { return i.stock > 0 && i.stock < i.threshold; }).length,
    outOfStock: data.filter(function (i) { return i.stock === 0; }).length,
    totalUnits: data.reduce(function (a, b) { return a + b.stock; }, 0)
  };

  function handleFileUpload(e) {
    var file = e.target.files[0];
    if (!file) return;
    setIsUploading(true);
    setUploadMsg("");

    var reader = new FileReader();
    reader.onload = function (evt) {
      try {
        var wb = XLSX.read(evt.target.result, { type: "binary" });
        var sheetName = wb.SheetNames.indexOf("庫存原始檔") !== -1 ? "庫存原始檔" : wb.SheetNames[0];
        var ws = wb.Sheets[sheetName];
        var rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

        if (!rows.length) {
          setUploadMsg("❌ 檔案沒有資料，請確認格式是否正確");
          setIsUploading(false);
          return;
        }

        var matched = {};
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          var loc = String(row["儲存地點"] != null ? row["儲存地點"] : "").trim();
          if (loc !== TARGET_LOCATION) continue;

          var model = String(row["物料"] != null ? row["物料"] : "").trim();
          if (!model) continue;

          var category = getCategory(model);
          if (!category) continue;

          var qty = Number(row["未限制"] != null ? row["未限制"] : 0) || 0;

          if (!matched[model]) {
            matched[model] = { model: model, category: category, stock: 0, threshold: DEFAULT_THRESHOLD[category] || 5 };
          }
          matched[model].stock += qty;
        }

        var items = Object.keys(matched).map(function (k) { return matched[k]; });
        items.sort(function (a, b) {
          if (a.category === b.category) return a.model.localeCompare(b.model);
          return a.category.localeCompare(b.category);
        });

        if (!items.length) {
          setUploadMsg("❌ 在儲位 " + TARGET_LOCATION + " 中找不到符合分類的型號，請確認檔案內容");
          setIsUploading(false);
          return;
        }

        var now = new Date().toLocaleString("zh-TW", { hour12: false });

        DOC_REF.set({ items: items, updatedAt: now }).then(function () {
          setUploadMsg("✅ 成功更新 " + items.length + " 項產品（儲位 " + TARGET_LOCATION + "），經銷商重新整理頁面即可看到");
          setIsUploading(false);
        }).catch(function (err) {
          console.error(err);
          setUploadMsg("❌ 上傳到雲端失敗，請確認網路連線或 Firebase 設定");
          setIsUploading(false);
        });
      } catch (err) {
        console.error(err);
        setUploadMsg("❌ 解析失敗，請確認上傳的是正確的 SAP 庫存表");
        setIsUploading(false);
      }
    };
    reader.readAsBinaryString(file);
    e.target.value = "";
  }

  // ── Header ──
  var header = h("div", {
    style: {
      background: "linear-gradient(135deg, #1A237E 0%, #283593 60%, #3949AB 100%)",
      padding: "20px 20px 0", position: "sticky", top: 0, zIndex: 100,
      boxShadow: "0 2px 12px rgba(26,35,126,0.25)"
    }
  },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
      h("div", null,
        h("div", { style: { color: "rgba(255,255,255,0.6)", fontSize: 11, letterSpacing: 2, textTransform: "uppercase" } }, "庫存查詢系統"),
        h("div", { style: { color: "#fff", fontSize: 20, fontWeight: 800, marginTop: 2 } }, "聲寶家電庫存查詢")
      ),
      lastUpdated ? h("div", { style: { textAlign: "right" } },
        h("div", { style: { color: "rgba(255,255,255,0.5)", fontSize: 10 } }, "上次更新"),
        h("div", { style: { color: "rgba(255,255,255,0.85)", fontSize: 11, marginTop: 1 } }, lastUpdated)
      ) : null
    ),
    h("div", { style: { display: "flex", gap: 4, marginTop: 16 } },
      ["查詢", "管理"].map(function (t) {
        return h("button", {
          key: t,
          onClick: function () { setTab(t); },
          style: {
            padding: "8px 20px", borderRadius: "8px 8px 0 0", border: "none", cursor: "pointer",
            fontWeight: 700, fontSize: 13,
            background: tab === t ? "#F2F4F8" : "transparent",
            color: tab === t ? "#1A237E" : "rgba(255,255,255,0.7)",
            transition: "all 0.2s"
          }
        }, t);
      })
    )
  );

  // ── 查詢分頁內容 ──
  var queryContent = null;
  if (tab === "查詢") {
    if (data.length === 0) {
      queryContent = h("div", { style: { textAlign: "center", padding: "50px 20px", background: "#fff", borderRadius: 14, color: "#AAAAAA" } },
        h("div", { style: { fontSize: 36 } }, "📭"),
        h("div", { style: { marginTop: 10, fontSize: 14, fontWeight: 600, color: "#777" } }, "尚無庫存資料"),
        h("div", { style: { marginTop: 4, fontSize: 12 } }, "請至「管理」分頁上傳 SAP 庫存表")
      );
    } else {

      var groups = {};
      filtered.forEach(function (item) {
        if (!groups[item.category]) groups[item.category] = [];
        groups[item.category].push(item);
      });

      var groupBlocks = filtered.length === 0
        ? h("div", { style: { textAlign: "center", padding: "40px 20px", background: "#fff", borderRadius: 14, color: "#AAAAAA" } },
            h("div", { style: { fontSize: 32 } }, "📦"),
            h("div", { style: { marginTop: 8, fontSize: 14 } }, "查無符合條件的產品")
          )
        : Object.keys(groups).map(function (cat) {
            var items = groups[cat];
            return h("div", { key: cat, style: { marginBottom: 16 } },
              h("div", { style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 700, color: "#666", padding: "4px 4px 6px" } },
                h("span", { style: { width: 8, height: 8, borderRadius: "50%", background: (CATEGORY_COLORS[cat] || {}).dot } }),
                cat + "（" + items.length + "）"
              ),
              h("div", { style: { borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 6px rgba(0,0,0,0.06)" } },
                items.map(function (item) { return h(ProductRow, { key: item.model, item: item }); })
              )
            );
          });

      queryContent = h(React.Fragment, null,
        alertItems.length > 0 ? h("div", {
          style: {
            background: "#FFF8E1", borderRadius: 10, padding: "10px 14px",
            border: "1px solid #FFD54F", marginBottom: 14, display: "flex", alignItems: "flex-start", gap: 8
          }
        },
          h("span", { style: { fontSize: 18 } }, "⚠️"),
          h("span", { style: { fontSize: 12, color: "#E65100", fontWeight: 600, lineHeight: 1.5 } }, alertItems.length + " 項產品庫存不足或缺貨")
        ) : null,
        h("div", { style: { display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 10 } },
          categories.map(function (c) {
            return h("button", {
              key: c,
              onClick: function () { setCategoryFilter(c); },
              style: {
                padding: "5px 12px", borderRadius: 99, border: "1.5px solid",
                whiteSpace: "nowrap", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                borderColor: categoryFilter === c ? "#1A237E" : "#E0E0E0",
                background: categoryFilter === c ? "#1A237E" : "#fff",
                color: categoryFilter === c ? "#fff" : "#666",
                transition: "all 0.15s"
              }
            }, c);
          })
        ),
        h("div", { style: { fontSize: 12, color: "#999", marginBottom: 10 } }, "顯示 " + filtered.length + " / " + data.length + " 項"),
        groupBlocks
      );
    }
  }

  // ── 管理分頁內容 ──
  var manageContent = null;
  if (tab === "管理" && !currentUser) {
    manageContent = h(LoginForm);
  } else if (tab === "管理" && currentUser) {
    var ruleRows = CATEGORY_LIST.map(function (cat) {
      var c = CATEGORY_COLORS[cat];
      var rule = null;
      for (var i = 0; i < PREFIX_RULES.length; i++) {
        if (PREFIX_RULES[i].category === cat) { rule = PREFIX_RULES[i]; break; }
      }
      return h("div", { key: cat, style: { display: "flex", alignItems: "center", gap: 10 } },
        h("span", { style: { width: 10, height: 10, borderRadius: "50%", background: c.dot, flexShrink: 0 } }),
        h("span", { style: { fontSize: 13, fontWeight: 700, color: "#333", width: 78 } }, cat),
        h("span", { style: { fontSize: 12, color: "#888", fontFamily: "monospace" } }, rule.prefixes.map(function (p) { return p + "-"; }).join(" / ") + " 開頭")
      );
    });

    var statBoxes = [
      { label: "總品項數", value: stats.total },
      { label: "總庫存台數", value: stats.totalUnits },
      { label: "庫存不足", value: stats.lowStock },
      { label: "完全無庫存", value: stats.outOfStock }
    ].map(function (s) {
      return h("div", { key: s.label, style: { background: "#F8F9FF", borderRadius: 8, padding: "10px 12px" } },
        h("div", { style: { fontSize: 11, color: "#888" } }, s.label),
        h("div", { style: { fontSize: 20, fontWeight: 800, color: "#1A237E", marginTop: 2 } }, s.value)
      );
    });

    manageContent = h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: "#fff", borderRadius: 14, padding: "12px 16px", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontSize: 12, color: "#666" } }, "👤 已登入：" + currentUser.email),
        h("button", {
          onClick: handleLogout,
          style: {
            padding: "6px 14px", borderRadius: 8, border: "1.5px solid #E0E0E0",
            background: "#fff", color: "#C62828", fontWeight: 700, fontSize: 12,
            cursor: "pointer", fontFamily: "inherit"
          }
        }, "登出")
      ),
      h("div", { style: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontWeight: 800, fontSize: 16, color: "#1A237E", marginBottom: 4 } }, "📤 上傳 SAP 庫存表"),
        h("div", { style: { fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.6 } },
          "直接上傳 SAP 匯出的庫存表（.xlsx/.xlsm）。系統會自動從「庫存原始檔」工作表中，篩選儲存地點 " + TARGET_LOCATION + " 且符合五大分類的型號，更新後經銷商重新整理頁面即可看到。"
        ),
        h("button", {
          onClick: function () { if (fileRef.current) fileRef.current.click(); },
          disabled: isUploading,
          style: {
            width: "100%", padding: "14px", borderRadius: 10, border: "2px dashed #3949AB",
            background: isUploading ? "#F5F5F5" : "#EEF0FB", color: "#3949AB", fontWeight: 700, fontSize: 14,
            cursor: isUploading ? "not-allowed" : "pointer", fontFamily: "inherit",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8
          }
        }, isUploading ? "⏳ 解析並上傳中…" : "📁 每日上傳庫存表"),
        h("input", { ref: fileRef, type: "file", accept: ".xlsx,.xls,.xlsm", onChange: handleFileUpload, style: { display: "none" } }),
        uploadMsg ? h("div", {
          style: {
            marginTop: 12, padding: "10px 14px", borderRadius: 8,
            background: uploadMsg.indexOf("✅") === 0 ? "#E8F5E9" : "#FFEBEE",
            color: uploadMsg.indexOf("✅") === 0 ? "#2E7D32" : "#C62828",
            fontSize: 13, fontWeight: 600, lineHeight: 1.5
          }
        }, uploadMsg) : null
      ),
      h("div", { style: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 } }, "📋 自動分類規則"),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } }, ruleRows),
        h("div", { style: { marginTop: 14, padding: "10px 12px", background: "#F8F9FF", borderRadius: 8, fontSize: 11, color: "#666", lineHeight: 1.6 } },
          "只顯示儲存地點為 " + TARGET_LOCATION + " 的庫存。不符合上述分類前綴的型號將不會出現在經銷商畫面。"
        )
      ),
      h("div", { style: { background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" } },
        h("div", { style: { fontWeight: 700, fontSize: 14, color: "#333", marginBottom: 12 } }, "📊 目前資料狀態"),
        h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } }, statBoxes),
        lastUpdated ? h("div", { style: { marginTop: 10, fontSize: 11, color: "#AAAAAA" } }, "最後更新時間：" + lastUpdated) : null
      )
    );
  }

  return h("div", { style: { minHeight: "100vh", background: "#F2F4F8", maxWidth: 480, margin: "0 auto" } },
    header,
    h("div", { style: { padding: "16px 16px 40px" } },
      loading ? h("div", { style: { textAlign: "center", padding: "60px 20px", color: "#AAAAAA" } }, "載入中…") : (tab === "查詢" ? queryContent : manageContent)
    )
  );
}

try {
  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(InventoryApp));
} catch (e) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  box.textContent = "渲染時發生錯誤：\n" + e.message + "\n" + (e.stack || "");
}
</script>
</body>
</html>
